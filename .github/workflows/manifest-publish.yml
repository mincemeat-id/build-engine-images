name: manifest-publish

on:
  push:
    branches: [master]
    paths:
      - "manifest.json"
      - "schemas/manifest.schema.json"
      - ".github/workflows/manifest-publish.yml"
  release:
    types: [published]
  pull_request:
    paths:
      - "manifest.json"
      - "schemas/manifest.schema.json"
      - ".github/workflows/manifest-publish.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  validate:
    name: Validate manifest against schema
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install --quiet "jsonschema==4.*"
      - name: Validate manifest.json
        run: python scripts/generate_manifest.py --validate-only
      - name: Reject placeholder version on release
        # Stage 0 Quick Win: belt-and-braces release-only check (the schema
        # already rejects "0.0.0" but this also catches placeholder image tags).
        if: github.event_name == 'release'
        run: |
          python scripts/check_manifest_release.py --manifest manifest.json

  publish:
    name: Publish manifest artifact (Stage 6 enforcement)
    needs: validate
    runs-on: ubuntu-24.04
    if: github.event_name == 'release' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Open manifest bump PR in build-engine
        env:
          GITHUB_TOKEN: ${{ secrets.MANIFEST_BUMP_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          echo "Cloning mincemeat-id/build-engine..."
          if gh repo clone mincemeat-id/build-engine build-engine -- --depth=1; then
            cp manifest.json build-engine/manifest.json
            cd build-engine

            if git diff --quiet manifest.json; then
              echo "No differences in manifest.json. Skipping PR creation."
              exit 0
            fi

            BRANCH="bump-manifest-${{ github.sha }}"
            git checkout -b "$BRANCH"
            git add manifest.json
            git commit -m "chore: bump build-engine-images manifest to $(jq -r '.version' manifest.json)"

            echo "Pushing branch $BRANCH..."
            git push origin "$BRANCH"

            echo "Creating pull request..."
            gh pr create \
              --title "chore: bump build-engine-images manifest to $(jq -r '.version' manifest.json)" \
              --body "Automated pull request triggered by build-engine-images update." \
              --base master \
              --head "$BRANCH"
          else
            echo "Warning: Could not clone mincemeat-id/build-engine. This is expected if the repository does not exist or if permissions are restricted."
          fi
