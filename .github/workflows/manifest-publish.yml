name: manifest-publish

on:
  push:
    branches: [main]
    paths:
      - "manifest.json"
      - "schemas/manifest.schema.json"
      - ".github/workflows/manifest-publish.yml"
  release:
    types: [published]
  pull_request:
    paths:
      - "manifest.json"
      - "schemas/manifest.schema.json"
      - ".github/workflows/manifest-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  validate:
    name: Validate manifest against schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install --quiet "jsonschema==4.*"
      - name: Validate manifest.json
        run: |
          python - <<'PY'
          import json, sys
          from jsonschema import Draft202012Validator
          with open("schemas/manifest.schema.json") as f:
              schema = json.load(f)
          with open("manifest.json") as f:
              data = json.load(f)
          Draft202012Validator.check_schema(schema)
          v = Draft202012Validator(schema)
          errors = sorted(v.iter_errors(data), key=lambda e: list(e.path))
          if errors:
              for e in errors:
                  loc = "/".join(str(p) for p in e.path) or "<root>"
                  print(f"::error file=manifest.json::{loc}: {e.message}")
              sys.exit(1)
          print("manifest.json passes schema validation.")
          PY

  publish:
    name: Publish manifest artifact (Stage 6 enforcement)
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Stage 0 placeholder
        run: |
          echo "Stage 0 scaffold: manifest publication / build-engine PR lands in Stage 6."
