name: build-and-publish

on:
  pull_request:
    paths:
      - "node/**"
      - "bun/**"
      - "hugo/**"
      - "zola/**"
      - "entrypoint/**"
      - "scripts/**"
      - "schemas/**"
      - "image-size-budgets.json"
      - ".github/workflows/build-and-publish.yml"
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      rc_version:
        description: "Manifest version to use for release-candidate tags and candidate manifest."
        required: true
        default: "1.0.0"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: build-and-publish-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  matrix:
    name: Resolve image matrix
    runs-on: ubuntu-24.04
    outputs:
      images: ${{ steps.set.outputs.images }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: set
        # Stage 2/7: hard-coded matrix of v1 GA and promoted candidate images. A later stage may add
        # changed-path detection; for now we build all supported images on every run so
        # size and smoke reporting stay comprehensive.
        run: |
          echo 'images=[
            {"name":"node","tag":"20","dockerfile":"node/20.Dockerfile","expected_id":"debian","expected_codename":"trixie"},
            {"name":"node","tag":"22","dockerfile":"node/22.Dockerfile","expected_id":"debian","expected_codename":"trixie"},
            {"name":"bun","tag":"1","dockerfile":"bun/1.Dockerfile","expected_id":"debian","expected_codename":""},
            {"name":"hugo","tag":"latest","dockerfile":"hugo/latest.Dockerfile","expected_id":"debian","expected_codename":"trixie"},
            {"name":"zola","tag":"latest","dockerfile":"zola/latest.Dockerfile","expected_id":"debian","expected_codename":"trixie"}
          ]' | tr -d '\n' >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.image.name }}:${{ matrix.image.tag }}
    needs: matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.matrix.outputs.images) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Calculate Image Tags
        id: tags
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          DISPATCH_RC_VERSION="${{ inputs.rc_version || '' }}"

          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$DISPATCH_RC_VERSION" ]; then
            VERSION="$DISPATCH_RC_VERSION"
          fi

          RUN_TRACK="${{ matrix.image.tag }}"

          if [ "$RUN_TRACK" = "latest" ]; then
            RELEASE_TAG="${VERSION}"
            PR_TAG="pr-${{ github.event.number || github.event.pull_request.number }}"
            RC_TAG="${VERSION}-rc.${{ github.run_number }}"
            NIGHTLY_TAG="nightly-$(date +%Y%m%d)"
          else
            RELEASE_TAG="${RUN_TRACK}-${VERSION}"
            PR_TAG="${RUN_TRACK}-pr-${{ github.event.number || github.event.pull_request.number }}"
            RC_TAG="${RUN_TRACK}-${VERSION}-rc.${{ github.run_number }}"
            NIGHTLY_TAG="${RUN_TRACK}-nightly-$(date +%Y%m%d)"
          fi

          if [ "${{ github.event_name }}" = "release" ]; then
            ACTIVE_TAG="$RELEASE_TAG"
          elif [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ACTIVE_TAG="$RC_TAG"
          else
            ACTIVE_TAG="$PR_TAG"
          fi

          {
            echo "manifest_version=$VERSION"
            echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "release_tag=$RELEASE_TAG"
            echo "active_tag=$ACTIVE_TAG"
            echo "rc_tag=$RC_TAG"
            echo "pr_tag=$PR_TAG"
            echo "nightly_tag=$NIGHTLY_TAG"
          } >> "$GITHUB_OUTPUT"

          echo "Calculated tags:"
          echo "  Release tag: $RELEASE_TAG"
          echo "  Active tag: $ACTIVE_TAG"
          echo "  RC tag: $RC_TAG"
          echo "  PR tag: $PR_TAG"
          echo "  Nightly tag: $NIGHTLY_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image (load locally for size + smoke)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          load: true
          push: false
          tags: build-engine-images/${{ matrix.image.name }}:${{ matrix.image.tag }}-ci
          build-args: |
            VERSION=${{ steps.tags.outputs.manifest_version }}
            GIT_REVISION=${{ github.sha }}
            BUILD_DATE=${{ steps.tags.outputs.build_date }}
            MANIFEST_VERSION=${{ steps.tags.outputs.manifest_version }}
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.image.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.image.tag }}

      - name: Capture local image digest (PR attestation subject)
        id: local-digest
        run: |
          set -euo pipefail
          tag="build-engine-images/${{ matrix.image.name }}:${{ matrix.image.tag }}-ci"
          # docker image ID is `sha256:<hex>`; strip the prefix for downstream use.
          IMAGEID=$(docker image inspect "$tag" --format '{{.Id}}')
          DIGEST=${IMAGEID#sha256:}
          if [ -z "$DIGEST" ]; then
            echo "::error::Failed to extract local image digest for $tag" >&2
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Capture image metadata and validate OS codename
        run: |
          set -euo pipefail
          mkdir -p image-metadata
          tag="build-engine-images/${{ matrix.image.name }}:${{ matrix.image.tag }}-ci"
          args=(--image "$tag")
          if [ -n "${{ matrix.image.expected_id }}" ]; then
            args+=(--expected-id "${{ matrix.image.expected_id }}")
          fi
          if [ -n "${{ matrix.image.expected_codename }}" ]; then
            args+=(--expected-codename "${{ matrix.image.expected_codename }}")
          fi
          scripts/collect_image_metadata.sh "${args[@]}" \
            > "image-metadata/${{ matrix.image.name }}_${{ matrix.image.tag }}.json"

      - name: Upload image metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: image-metadata-${{ matrix.image.name }}-${{ matrix.image.tag }}
          path: image-metadata/${{ matrix.image.name }}_${{ matrix.image.tag }}.json
          if-no-files-found: error
          retention-days: 7

      - name: Report image size
        id: size
        run: |
          set -euo pipefail
          tag="build-engine-images/${{ matrix.image.name }}:${{ matrix.image.tag }}-ci"
          mkdir -p image-size
          record="image-size/image-size-${{ matrix.image.name }}-${{ matrix.image.tag }}.json"
          scripts/write_image_size_record.sh \
            --image "$tag" \
            --logical "${{ matrix.image.name }}:${{ matrix.image.tag }}" \
            --dockerfile "${{ matrix.image.dockerfile }}" \
            --manifest-version "${{ steps.tags.outputs.manifest_version }}" \
            --output "$record"
          python scripts/check_image_size_budget.py --record "$record" --budgets image-size-budgets.json
          bytes=$(jq -r '.bytes' "$record")
          mib=$(jq -r '.mib' "$record")
          echo "bytes=$bytes" >> "$GITHUB_OUTPUT"
          echo "mib=$mib" >> "$GITHUB_OUTPUT"
          {
            echo "### Image size: \`${{ matrix.image.name }}:${{ matrix.image.tag }}\`"
            echo
            echo "| Image | Size (bytes) | Size (MiB) |"
            echo "|-------|--------------|------------|"
            echo "| ${{ matrix.image.name }}:${{ matrix.image.tag }} | $bytes | $mib |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload size record
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: image-size-${{ matrix.image.name }}-${{ matrix.image.tag }}
          path: image-size/image-size-${{ matrix.image.name }}-${{ matrix.image.tag }}.json
          if-no-files-found: error
          retention-days: 7

      - name: Smoke entrypoint (manifest validation + generic build)
        run: |
          set -euo pipefail
          work=$(mktemp -d)
          mkdir -p "$work/src" "$work/out" "$work/cache" "$work/build"
          chmod -R 0777 "$work"
          cat > "$work/build/manifest.json" <<'EOF'
          {
            "framework": "generic",
            "package_manager": "none",
            "build_command": "mkdir -p dist && echo '<html><body>smoke ok</body></html>' > dist/index.html",
            "output_dir": "dist",
            "root": "."
          }
          EOF
          docker run --rm \
            -v "$work/build:/build:ro" \
            -v "$work/src:/workspace/src" \
            -v "$work/out:/workspace/out" \
            -v "$work/cache:/cache" \
            "build-engine-images/${{ matrix.image.name }}:${{ matrix.image.tag }}-ci"
          test -f "$work/out/index.html"
          grep -q "smoke ok" "$work/out/index.html"

      - name: Run Trivy vulnerability scanner (JSON)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'build-engine-images/${{ matrix.image.name }}:${{ matrix.image.tag }}-ci'
          format: 'json'
          output: 'trivy-results.json'

      - name: Enforce CVE Budget
        run: |
          python scripts/enforce_cve_budget.py --report trivy-results.json --exceptions security-exceptions.json

      - name: Audit security exceptions ledger
        # Stage 0 Quick Win: warn when security-exceptions.json contains only
        # example or expired entries so a stale ledger never silently
        # suppresses real CVEs.
        run: |
          python scripts/check_security_exceptions.py --file security-exceptions.json --mode warn

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'build-engine-images/${{ matrix.image.name }}:${{ matrix.image.tag }}-ci'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ matrix.image.name }}-${{ matrix.image.tag }}
          path: sbom.json
          retention-days: 7

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforce Tag Immutability (GHCR REST)
        # Stage 1: replace `docker manifest inspect` (susceptible to stale
        # negatives) with a direct GHCR REST query using the workflow's
        # GITHUB_TOKEN. We list package versions for the image and reject
        # any reuse of the planned active tag.
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIVE_TAG: ${{ steps.tags.outputs.active_tag }}
          IMAGE_NAME: ${{ matrix.image.name }}
        run: |
          set -euo pipefail
          PACKAGE_NAME="build-engine-images%2F${IMAGE_NAME}"
          REST_PATH="/orgs/mincemeat-id/packages/container/${PACKAGE_NAME}/versions"
          echo "Querying GHCR REST API for $REST_PATH (tag=$ACTIVE_TAG)..."

          # gh exits non-zero on 404 (package not yet published) — treat as "no
          # versions yet", which is a legitimate first-publish situation.
          if ! RAW=$(gh api -H "Accept: application/vnd.github+json" \
                "$REST_PATH" --paginate 2>/tmp/gh-err); then
            if grep -q "Not Found" /tmp/gh-err; then
              echo "Package not yet published; tag is necessarily fresh."
              exit 0
            fi
            cat /tmp/gh-err >&2
            echo "::error::GHCR REST query failed" >&2
            exit 1
          fi

          if echo "$RAW" | jq -e --arg t "$ACTIVE_TAG" \
              'any(.[]?.metadata.container.tags[]?; . == $t)' >/dev/null; then
            echo "::error::Tag $ACTIVE_TAG already exists in GHCR. Re-publishing an existing tag is forbidden to ensure immutability."
            exit 1
          fi
          echo "Tag $ACTIVE_TAG does not exist. Proceeding with publication."

      - name: Push image to GHCR (buildx-authoritative digest)
        # Stage 1: push via docker/build-push-action so the registry-side
        # manifest digest is produced by buildx (steps.push.outputs.digest).
        # The previous flow used `docker tag`+`docker push` and then fell
        # back to image .Id when RepoDigests were empty, which could bind
        # cosign + SLSA to the wrong digest. Cache reuse keeps this fast.
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ghcr.io/mincemeat-id/build-engine-images/${{ matrix.image.name }}:${{ steps.tags.outputs.active_tag }}
          build-args: |
            VERSION=${{ steps.tags.outputs.manifest_version }}
            GIT_REVISION=${{ github.sha }}
            BUILD_DATE=${{ steps.tags.outputs.build_date }}
            MANIFEST_VERSION=${{ steps.tags.outputs.manifest_version }}
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.image.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.image.tag }}
          provenance: true
          sbom: false

      - name: Assert buildx digest is present
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${{ steps.push.outputs.digest }}" ]; then
            echo "::error::docker/build-push-action did not return an image digest" >&2
            exit 1
          fi
          echo "Pushed digest: ${{ steps.push.outputs.digest }}"

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: Sign published image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes "ghcr.io/mincemeat-id/build-engine-images/${{ matrix.image.name }}@${{ steps.push.outputs.digest }}"

      - name: Generate SLSA provenance attestation (Push)
        id: attest
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        if: github.event_name != 'pull_request'
        with:
          subject-name: ghcr.io/mincemeat-id/build-engine-images/${{ matrix.image.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate cosign-verifiable SLSA provenance attestation
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          IMG="ghcr.io/mincemeat-id/build-engine-images/${{ matrix.image.name }}@${{ steps.push.outputs.digest }}"
          jq -n \
            --arg ref "${{ github.ref }}" \
            --arg repo "https://github.com/${{ github.repository }}" \
            --arg workflow_path ".github/workflows/build-and-publish.yml" \
            --arg event_name "${{ github.event_name }}" \
            --arg repository_id "${{ github.repository_id }}" \
            --arg repository_owner_id "${{ github.repository_owner_id }}" \
            --arg runner_environment "${{ runner.environment }}" \
            --arg workflow_ref "${{ github.workflow_ref }}" \
            --arg sha "${{ github.sha }}" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}" \
            '{
              buildDefinition: {
                buildType: "https://actions.github.io/buildtypes/workflow/v1",
                externalParameters: {
                  workflow: {
                    ref: $ref,
                    repository: $repo,
                    path: $workflow_path
                  }
                },
                internalParameters: {
                  github: {
                    event_name: $event_name,
                    repository_id: $repository_id,
                    repository_owner_id: $repository_owner_id,
                    runner_environment: $runner_environment
                  }
                },
                resolvedDependencies: [
                  {
                    uri: ("git+" + $repo + "@" + $ref),
                    digest: {
                      gitCommit: $sha
                    }
                  }
                ]
              },
              runDetails: {
                builder: {
                  id: ("https://github.com/" + $workflow_ref)
                },
                metadata: {
                  invocationId: $run_url
                }
              }
            }' > slsa-provenance.json
          cosign attest --yes \
            --predicate slsa-provenance.json \
            --type slsaprovenance1 \
            "$IMG"

      - name: Verify cosign signature (post-publish)
        # Stage 1 post-condition: a publish without a verifiable signature
        # is treated as a failed publish. Keeps the trust chain honest.
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          IMG="ghcr.io/mincemeat-id/build-engine-images/${{ matrix.image.name }}@${{ steps.push.outputs.digest }}"
          cosign verify "$IMG" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Verify SLSA build-provenance attestation (post-publish)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          IMG="ghcr.io/mincemeat-id/build-engine-images/${{ matrix.image.name }}@${{ steps.push.outputs.digest }}"
          cosign verify-attestation "$IMG" \
            --type slsaprovenance1 \
            --certificate-identity-regexp "^https://github.com/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" >/dev/null

      - name: Attest build provenance for PR image (local digest)
        # Stage 1: PR attestations target the locally built image digest
        # (not the Dockerfile path), keeping subject semantics identical
        # to release attestations. The attestation is uploaded as a CI
        # artifact only and is NOT pushed to any registry.
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        if: github.event_name == 'pull_request'
        with:
          subject-name: build-engine-images/${{ matrix.image.name }}
          subject-digest: sha256:${{ steps.local-digest.outputs.digest }}
          push-to-registry: false

      - name: Save image digest and tag
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p image-outputs
          echo "tag=ghcr.io/mincemeat-id/build-engine-images/${{ matrix.image.name }}:${{ steps.tags.outputs.active_tag }}" > image-outputs/data.txt
          # steps.push.outputs.digest from docker/build-push-action already
          # includes the "sha256:" prefix.
          echo "digest=${{ steps.push.outputs.digest }}" >> image-outputs/data.txt
          SAFE_NAME=$(echo "${{ matrix.image.name }}_${{ matrix.image.tag }}" | tr ':' '_')
          mv image-outputs/data.txt "image-outputs/${SAFE_NAME}.txt"

      - name: Upload digest info
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-info-${{ matrix.image.name }}-${{ matrix.image.tag }}
          path: image-outputs/
          retention-days: 1

  manifest-update:
    name: Update, Sign and Publish Manifest
    needs: build
    if: github.event_name == 'release' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Stage 1: read-only checkout. The previous flow committed the
          # regenerated manifest back to master from inside this job, which
          # created a re-entry race with manifest-publish.yml's push trigger.
          # The release-tag image digests are the single source of truth and
          # are attached to the GitHub Release artifact instead.
          fetch-depth: 1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: pip install --quiet "jsonschema==4.*"

      - name: Download all digest artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: digest-info-*
          path: digest-artifacts

      - name: Generate updated manifest.json
        id: generate
        run: |
          ARGS=()
          while IFS= read -r -d '' f; do
            filename=$(basename "$f" .txt)
            case "$filename" in
              node_20) logical_name="node:20" ;;
              node_22) logical_name="node:22" ;;
              bun_1) logical_name="bun:1" ;;
              hugo_latest) logical_name="hugo:latest" ;;
              zola_latest) logical_name="zola:latest" ;;
              *)
                echo "::error::Unknown digest artifact '$filename'. Add a mapping in build-and-publish.yml." >&2
                exit 1
                ;;
            esac
            tag=$(grep "^tag=" "$f" | cut -d'=' -f2)
            digest=$(grep "^digest=" "$f" | cut -d'=' -f2)
            ARGS+=("--image-tag" "${logical_name}=${tag}" "--image-digest" "${logical_name}=${digest}")
          done < <(find digest-artifacts -name "*.txt" -print0)

          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION_VAL="${{ github.event.release.tag_name }}"
            VERSION_VAL="${VERSION_VAL#v}"
            ARGS+=("--version-semver" "$VERSION_VAL")
            echo "release_version=$VERSION_VAL" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION_VAL="${{ inputs.rc_version }}"
            ARGS+=("--version-semver" "$VERSION_VAL")
            echo "release_version=$VERSION_VAL" >> "$GITHUB_OUTPUT"
          fi

          python scripts/generate_manifest.py "${ARGS[@]}"

      - name: Reject placeholder version on release
        # Stage 0 Quick Win: even though the schema already rejects "0.0.0",
        # this is a release-only belt-and-braces check that also catches
        # placeholder image tags (e.g. "...:20-0.0.0").
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: |
          python scripts/check_manifest_release.py --manifest manifest.json

      - name: Upload Candidate Manifest
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: candidate-manifest
          path: manifest.json

      - name: Install Cosign
        if: github.event_name == 'release'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: Sign manifest.json (cosign keyless blob signature)
        # Stage 1: produce a verifiable signature over the released
        # manifest.json itself so consumers can prove the image digests
        # they pull originated from this workflow. The .sig + .pem are
        # attached to the GitHub Release alongside the manifest.
        if: github.event_name == 'release'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature manifest.json.sig \
            --output-certificate manifest.json.pem \
            manifest.json
          sha256sum manifest.json manifest.json.sig manifest.json.pem > manifest.json.sha256

      - name: Attest manifest.json provenance
        if: github.event_name == 'release'
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: manifest.json

      - name: Attach manifest.json + signature to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            manifest.json \
            manifest.json.sig \
            manifest.json.pem \
            manifest.json.sha256 \
            --clobber

  size-report:
    name: Aggregate image size report
    needs: build
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Note
        run: |
          echo "Per-image size summaries are appended to each build job's summary."
          echo "Structured image-size-<name>-<track>.json artifacts are uploaded for release review."
