name: fixture-smoke

on:
  pull_request:
    paths:
      - "tests/**"
      - "entrypoint/**"
      - "node/**"
      - "bun/**"
      - "hugo/**"
      - "zola/**"
      - ".github/workflows/fixture-smoke.yml"
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  entrypoint-tests:
    name: Entrypoint contract tests (Stage 1)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi
      - name: Run build-entrypoint shell tests
        run: bash tests/smoke/run-tests.sh

  smoke:
    name: Fixture smoke (Stage 3 enforcement)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Confirm Docker daemon and Buildx
        run: |
          set -euo pipefail
          docker version
          docker buildx version
          docker buildx inspect --bootstrap
      - name: Run cold build smoke tests
        run: bash tests/smoke/run-cold.sh
      - name: Run warm-cache build smoke tests
        run: bash tests/smoke/run-warm.sh
