name: manifest-publish

on:
  push:
    branches: [master]
    paths:
      - "manifest.json"
      - "schemas/manifest.schema.json"
      - ".github/workflows/manifest-publish.yml"
  release:
    types: [published]
  pull_request:
    paths:
      - "manifest.json"
      - "schemas/manifest.schema.json"
      - ".github/workflows/manifest-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  validate:
    name: Validate manifest against schema
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install --quiet "jsonschema==4.*"
      - name: Validate manifest.json
        run: python scripts/generate_manifest.py --validate-only
      - name: Reject placeholder version on release
        # Stage 0 Quick Win: belt-and-braces release-only check (the schema
        # already rejects "0.0.0" but this also catches placeholder image tags).
        if: github.event_name == 'release'
        run: |
          python scripts/check_manifest_release.py --manifest manifest.json

  publish:
    name: Open manifest bump PR in build-engine
    needs: validate
    runs-on: ubuntu-24.04
    # Stage 1: single-writer policy — only the release event opens the
    # cross-repo PR. Previously `push` to master also triggered a PR which,
    # combined with the build-and-publish commit-back step, could double-fire
    # bumps on a single release. The build-and-publish workflow no longer
    # commits to master, and this job no longer fires on push.
    if: github.event_name == 'release'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Mint GitHub App installation token for build-engine
        # Stage 1: the previous flow tried GITHUB_TOKEN, which has no
        # cross-repo write. The App approach scopes write access to a
        # single target repository and is auditable in the App's
        # installation log. Required org secrets:
        #   MANIFEST_BUMP_APP_ID
        #   MANIFEST_BUMP_APP_PRIVATE_KEY
        # The App must be installed on mincemeat-id/build-engine with
        # Contents: write and Pull requests: write.
        id: app-token
        uses: actions/create-github-app-token@af35edadc00be37caa72ed9f3e6d5f7801bfdf09 # v1
        with:
          app-id: ${{ secrets.MANIFEST_BUMP_APP_ID }}
          private-key: ${{ secrets.MANIFEST_BUMP_APP_PRIVATE_KEY }}
          owner: mincemeat-id
          repositories: build-engine

      - name: Download released manifest assets
        # Stage 1: pull the signed manifest + signature + cert that
        # build-and-publish.yml attached to the GitHub Release so the
        # cross-repo PR links to verifiable artifacts.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "$RELEASE_TAG" \
            --pattern 'manifest.json' \
            --pattern 'manifest.json.sig' \
            --pattern 'manifest.json.pem' \
            --pattern 'manifest.json.sha256' \
            --dir release-assets

      - name: Open manifest bump PR in build-engine
        # Stage 1: hard-fail on any error (clone / push / PR open). The
        # previous flow silently swallowed clone failure ("Warning") and
        # exited 0, which let a release look successful while the engine
        # never bumped.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IMAGES_REPO: ${{ github.repository }}
          IMAGES_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          git config --global user.email "manifest-bump-app[bot]@users.noreply.github.com"
          git config --global user.name  "manifest-bump-app[bot]"

          echo "Cloning mincemeat-id/build-engine..."
          gh repo clone mincemeat-id/build-engine build-engine -- --depth=1

          cp release-assets/manifest.json build-engine/manifest.json
          cd build-engine

          if git diff --quiet manifest.json; then
            echo "No differences in manifest.json. Skipping PR creation."
            exit 0
          fi

          VERSION=$(jq -r '.version' manifest.json)
          BRANCH="bump-manifest-${VERSION}"
          git checkout -b "$BRANCH"
          git add manifest.json
          git commit -m "chore: bump build-engine-images manifest to ${VERSION}"

          echo "Pushing branch $BRANCH..."
          git push --force-with-lease origin "$BRANCH"

          RELEASE_URL="https://github.com/${IMAGES_REPO}/releases/tag/${RELEASE_TAG}"
          MANIFEST_URL="${RELEASE_URL}/manifest.json"
          MANIFEST_SIG_URL="${RELEASE_URL}/manifest.json.sig"
          MANIFEST_PEM_URL="${RELEASE_URL}/manifest.json.pem"

          PR_BODY=$(cat <<EOF
          Automated manifest bump from \`${IMAGES_REPO}\` release \`${RELEASE_TAG}\`.

          - **Manifest version:** \`${VERSION}\`
          - **Source commit:** \`${IMAGES_SHA}\`
          - **Release:** ${RELEASE_URL}

          ### Signed artifacts

          - Manifest: ${MANIFEST_URL}
          - Cosign signature: ${MANIFEST_SIG_URL}
          - Cosign certificate: ${MANIFEST_PEM_URL}

          ### Verification

          \`\`\`shell
          gh release download "${RELEASE_TAG}" --repo "${IMAGES_REPO}" \\
            --pattern 'manifest.json*'
          cosign verify-blob \\
            --certificate manifest.json.pem \\
            --signature  manifest.json.sig \\
            --certificate-identity-regexp "^https://github.com/${IMAGES_REPO}/" \\
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \\
            manifest.json
          \`\`\`

          Image cosign signatures and SLSA build-provenance attestations are
          attached at the registry — see \`docs/verification.md\` in
          \`${IMAGES_REPO}\` for end-to-end recipes.
          EOF
          )

          echo "Creating pull request..."
          gh pr create \
            --title "chore: bump build-engine-images manifest to ${VERSION}" \
            --body  "$PR_BODY" \
            --base  master \
            --head  "$BRANCH"
