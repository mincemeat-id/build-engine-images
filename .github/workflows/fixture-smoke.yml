    paths:
      - "tests/**"
      - "entrypoint/**"
      - "node/**"
      - "bun/**"
      - "hugo/**"
      - ".github/workflows/fixture-smoke.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Fixture smoke (Stage 3 enforcement)
    runs-on: ubuntu-latest
    steps:
