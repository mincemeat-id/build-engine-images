name: trivy-scan

on:
  pull_request:
    paths:
      - "node/**"
      - "bun/**"
      - "hugo/**"
      - "zola/**"
      - ".github/workflows/trivy-scan.yml"
  push:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1" # Weekly rebuild/rescan (Mon 06:00 UTC).
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Trivy scan (Stage 5 enforcement)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: node
            tag: "20"
            dockerfile: node/20.Dockerfile
          - name: node
            tag: "22"
            dockerfile: node/22.Dockerfile
          - name: bun
            tag: "1"
            dockerfile: bun/1.Dockerfile
          - name: hugo
            tag: latest
            dockerfile: hugo/latest.Dockerfile
          - name: zola
            tag: latest
            dockerfile: zola/latest.Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          load: true
          push: false
          tags: build-engine-images/${{ matrix.image.name }}:${{ matrix.image.tag }}-ci
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.image.tag }}-scan
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.image.tag }}-scan

      - name: Run Trivy vulnerability scanner (JSON)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'build-engine-images/${{ matrix.image.name }}:${{ matrix.image.tag }}-ci'
          format: 'json'
          output: 'trivy-results.json'

      - name: Enforce CVE Budget
        run: |
          python scripts/enforce_cve_budget.py --report trivy-results.json --exceptions security-exceptions.json

      - name: Audit security exceptions ledger
        # Stage 0 Quick Win: warn when security-exceptions.json contains only
        # example or expired entries.
        run: |
          python scripts/check_security_exceptions.py --file security-exceptions.json --mode warn

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: always()
        with:
          image-ref: 'build-engine-images/${{ matrix.image.name }}:${{ matrix.image.tag }}-ci'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
